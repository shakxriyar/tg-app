<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shokh Food Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --secondary: #94a3b8;
            --success: #10b981;
            --gradient: linear-gradient(135deg, #38bdf8 0%, #0ea5e9 100%);
            --transition: all 0.3s ease;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); padding: 15px; padding-bottom: 100px; }

        .panel { display: none; }
        .panel.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        header { text-align: center; padding: 20px 0; }
        header h1 { font-size: 28px; letter-spacing: 3px; text-transform: uppercase; font-weight: 900; }
        header h1 span { color: var(--accent); }

        .food-card {
            background: var(--card);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            gap: 15px;
            transition: var(--transition);
        }
        .food-card:active { transform: scale(0.98); }

        .btn-add {
            background: var(--gradient);
            color: #000;
            border: none;
            padding: 10px 15px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
        }

        .input-group { margin-bottom: 15px; }
        input {
            width: 100%;
            padding: 15px;
            background: #0f172a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            outline: none;
        }
        input:focus { border-color: var(--accent); }

        .info-card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        
        /* Maxsus Admin Link Style */
        .admin-btn-link {
            display: inline-block;
            margin-top: 10px;
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
            background: rgba(56, 189, 248, 0.1);
            padding: 8px 15px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div id="user-panel" class="panel active">
        <header><h1>SHOKH <span>FOOD</span></h1></header>
        <div id="menu-container">
            <div class="food-card">
                <div style="font-size: 40px;">🍔</div>
                <div style="flex:1">
                    <h3>Burger Maxi</h3>
                    <p style="font-size: 12px; color: var(--secondary);">45,000 so'm</p>
                </div>
                <button class="btn-add" onclick="addToCart('Burger Maxi', 45000)">QO'SHISH</button>
            </div>
        </div>
    </div>

    <div id="details-panel" class="panel">
        <h2 style="text-align:center; margin-bottom:20px;">Ma'lumotlar</h2>
        <div class="info-card">
            <input type="tel" id="u-phone" placeholder="Telefon raqamingiz" class="input-group">
            <input type="text" id="u-address" placeholder="Yetkazish manzili" class="input-group">
            <button class="btn-add" style="width:100%;" onclick="checkDetails()">DAVOM ETISH</button>
        </div>
        <button onclick="switchPanel('user-panel')" style="background:none; border:none; color:var(--secondary); width:100%;">ORQAGA</button>
    </div>

    <div id="payment-panel" class="panel">
        <h2 style="text-align:center; margin-bottom:20px;">To'lov usuli</h2>
        <div class="food-card" onclick="finalProcess('Naqd pul')">
            <span style="font-size:35px;">💵</span>
            <h3>Naqd pul (Kuryerga)</h3>
        </div>
        <div class="food-card" onclick="switchPanel('card-panel')">
            <span style="font-size:35px;">💳</span>
            <h3>Karta orqali (O'tkazma)</h3>
        </div>
    </div>

    <div id="card-panel" class="panel">
        <div class="info-card" style="text-align:center;">
            <p>Jami summa:</p>
            <h1 id="price-tag" style="color:var(--accent); margin: 10px 0;">0 so'm</h1>
            <p style="font-size:14px;">Karta: <b>8600 0000 0000 0000</b></p>
            <p style="font-size:14px;">Ega: <b>Shahriyor Allaberganov</b></p>
            <hr style="opacity:0.1; margin:15px 0;">
            <p style="font-size:13px; color:var(--secondary);">
                To'lovdan so'ng adminga chek va buyurtma raqamini yuboring:
            </p>
            <a href="https://t.me/shakhriyarr" class="admin-btn-link">@shakhriyarr 📨</a>
        </div>
        <button class="btn-add" style="width:100%;" onclick="finalProcess('Karta (Chek kutilmoqda)')">TASDIQLASH VA YUBORISH</button>
    </div>

    <div id="admin-panel" class="panel">
        <h2 style="text-align:center; margin-bottom:20px;">Admin: Ovqat qo'shish</h2>
        <div class="info-card">
            <input type="text" id="food-name" placeholder="Nomi..." class="input-group">
            <input type="number" id="food-price" placeholder="Narxi..." class="input-group">
            <button class="btn-add" style="width:100%;" onclick="adminAdd()">QO'SHISH</button>
        </div>
        <button onclick="switchPanel('user-panel')" style="background:none; border:none; color:var(--secondary); width:100%;">QAYTISH</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let cart = [];

        function switchPanel(id) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'user-panel') updateMainBtn();
            else tg.MainButton.hide();
        }

        function addToCart(n, p) {
            cart.push({name: n, price: p});
            tg.HapticFeedback.impactOccurred('light');
            updateMainBtn();
        }

        function updateMainBtn() {
            if(cart.length > 0) {
                const total = cart.reduce((s, i) => s + i.price, 0);
                tg.MainButton.setText(`SAVATCHA (${total.toLocaleString()} so'm)`).show();
            } else tg.MainButton.hide();
        }

        tg.onEvent('mainButtonClicked', () => switchPanel('details-panel'));

        function checkDetails() {
            if(!document.getElementById('u-phone').value || !document.getElementById('u-address').value) {
                return tg.showAlert("Ma'lumotlarni to'ldiring!");
            }
            const total = cart.reduce((s, i) => s + i.price, 0);
            document.getElementById('price-tag').innerText = total.toLocaleString() + " so'm";
            switchPanel('payment-panel');
        }

        function finalProcess(method) {
            const data = {
                action: 'ORDER',
                items: cart,
                total: cart.reduce((s, i) => s + i.price, 0),
                method: method,
                phone: document.getElementById('u-phone').value,
                address: document.getElementById('u-address').value
            };
            // TASDIQLASH OYNASISIZ TO'G'RI YUBORISH
            tg.sendData(JSON.stringify(data));
            tg.close();
        }

        function adminAdd() {
            const name = document.getElementById('food-name').value;
            const price = document.getElementById('food-price').value;
            if(!name || !price) return tg.showAlert("To'ldiring!");
            tg.sendData(JSON.stringify({action: 'ADMIN_ADD', name, price}));
            tg.close();
        }

        // Admin tugmasini chiqarish
        if(tg.initDataUnsafe.user && tg.initDataUnsafe.user.id === 8448862547) {
            const b = document.createElement('button');
            b.innerText = "⚙️";
            b.style = "position:fixed; bottom:20px; left:20px; width:50px; height:50px; border-radius:50%; background:var(--accent); border:none; font-size:20px; z-index:1000;";
            b.onclick = () => switchPanel('admin-panel');
            document.body.appendChild(b);
        }
    </script>
</body>
</html>
